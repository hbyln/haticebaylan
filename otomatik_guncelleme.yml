name: Benim Otomatik Güncelleyici Robotum

# Robot ne zaman çalışmaya başlasın?
on:
  schedule:
    # Bu satır "Her gün gece yarısı saat 00:00'da çalış" demektir (Cron ifadesi)
    - cron: '0 0 * * *'
  workflow_dispatch: # Bu da GitHub sitesine senin için bir "Şimdi Çalıştır" butonu ekler

jobs:
  guncelleme_isi:
    runs-on: ubuntu-latest # GitHub bizim için bir Linux bilgisayar açıyor
    steps:
      - name: Kodlarımı bilgisayara indir
        uses: actions/checkout@v4

      - name: Güncelleme Scriptini Çalıştır
        run: |
          # Buraya siteni güncelleyen kodları yazarsın.
          # Örneğin: Python ile bir API'den veri çekip dosyaya yazdırabilirsin.
          python guncelleme_kodum.py 

      - name: Değişen kodları GitHub'a geri yükle
        run: |
          git config --global user.name "GitHub Robotu"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Otomatik veri güncellemesi yapıldı!" || exit 0
          git push
